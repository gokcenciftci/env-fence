name: 'env-fence'
description: 'A deterministic, local-first environment variable and secret leak guard for CI.'
author: 'Gökçen Çiftci'
branding:
  icon: 'shield'
  color: 'blue'
inputs:
  paths:
    description: 'Space-separated paths to check (files or directories).'
    required: false
  env:
    description: 'Path to the environment variables file to check (default: .env).'
    required: false
  example:
    description: 'Path to the example environment variables file to check (default: .env.example).'
    required: false
  rules:
    description: 'Comma-separated list of rules to run (sync-env, missing-env-in-code, unused-env, secret-leak).'
    required: false
  format:
    description: 'Output format: text or json.'
    required: false
    default: 'text'
runs:
  using: 'node20'
  main: 'dist/cli.js'
